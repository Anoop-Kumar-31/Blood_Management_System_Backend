name: Keep MongoDB Awake
on:
  schedule:
    - cron: '0 0 */15 * *' # Runs every 15 days (Safe margin for 30-day limit)
  workflow_dispatch:

jobs:
  ping_mongo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install MongoDB Driver
        run: npm install mongodb

      - name: Ping Database
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          node -e "
          const { MongoClient } = require('mongodb');
          async function run() {
            const client = new MongoClient(process.env.MONGO_URI);
            try {
              await client.connect();
              
              // Target 'test' database and 'blood_banks' collection from your image
              const database = client.db('test');
              const collection = database.collection('blood_banks');
              
              // Find exactly one document and only return the 'name' field
              const bloodBank = await collection.findOne({}, { projection: { name: 1, _id: 0 } });
              
              if (bloodBank) {
                console.log('Successfully pinged! Found Blood Bank:', bloodBank.name);
              } else {
                console.log('Connected, but the blood_banks collection appears to be empty.');
              }
              
            } catch (err) {
              console.error('Database connection failed:', err.message);
              process.exit(1);
            } finally {
              await client.close();
            }
          }
          run();
          "
